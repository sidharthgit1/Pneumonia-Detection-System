{% extends "doctor/doctorindex.html" %}
{% block body %}

<form action="/myapp/doctor_edit_profile_post/" method="post" enctype="multipart/form-data">
{% csrf_token %}
<table width="200" border="1" class="table table-bordered">
  <tr>
    <td>Name</td>
    <td><label for="textfield"></label>
      <input type="text" name="textfield" id="textfield" value="{{ data.name }}" class="form-control" required/></td>
  </tr>
  <tr>
    <td>Email</td>
    <td><label for="textfield2"></label>
      <input type="text" name="textfield2" id="textfield2" value="{{ data.email }}" class="form-control" required /></td>
  </tr>
  <tr>
    <td>Contact</td>
     <td><label for="textfield3"></label>
      <input type="text" name="textfield3" id="textfield3" value="{{ data.contact }}" class="form-control" required/></td>
  </tr>
  <tr>
    <td>Qualification</td>
     <td><label for="textfield4"></label>
      <input type="text" name="textfield4" id="textfield4" value="{{ data.qualification }}" class="form-control" required/></td>
  </tr>
  <tr>
    <td>Place</td>
     <td><label for="textfield5"></label>
      <input type="text" name="textfield5" id="textfield5" value="{{ data.place }}" class="form-control" required/></td>
  </tr>
  <tr>
    <td>Pin</td>
     <td><label for="textfield6"></label>
      <input type="text" name="textfield6" id="textfield6" value="{{ data.pin }}" class="form-control" required/></td>
  </tr>
  <tr>
    <td>Post</td>
     <td><label for="textfield7"></label>
      <input type="text" name="textfield7" id="textfield7" value="{{ data.post }}" class="form-control" required /></td>
  </tr>
  <tr>
    <td>Photo</td>
      <td>
      <img src="{{ data.photo }}" height="100" width="100">

    <input type="file" name="imageField" id="imageField" src="../admin/img"  /></td>
  </tr>
{#  <tr>#}
{#    <td>Age</td>#}
{#    <td><label for="textfield8"></label>#}
{#      <input type="text" name="textfield8" id="textfield8" value="{{ data.age }}" required /></td>#}
{#  </tr>#}
  <tr>
    <td>Gender</td>
    <td>
    <p>
      <label>
        <input type = "radio" name="RadioGroup1" {% if data.gender == 'Male' %} checked {% endif %} value="Male" id="RadioGroup1_0" />
        Male</label>
      <br />
      <label>
        <input type="radio" name="RadioGroup1" value="Female" {% if data.gender == 'Female' %} checked {% endif %} id="RadioGroup1_1" />
        Female</label>
      <br />
    </p></td>
  </tr>
  <tr>
    <td>&nbsp;</td>
    <td><input type="submit" name="Edit" id="Edit" value="Edit" /></td>
  </tr>
</table>


</form>

{% endblock %}

{#</body>#}
{#</html>#}
