<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>

<form action="/myapp/user_sign_up_post/" method="post" enctype="multipart/form-data">
    {% csrf_token %}
<table width="200" border="1">
  <tr>
    <td>Name</td>
    <td><label for="textfield"></label>
      <input type="text" name="textfield" id="textfield" /></td>
  </tr>
  <tr>
    <td>Email</td>
    <td><label for="textfield2"></label>
      <input type="text" name="textfield2" id="textfield2" /></td>
  </tr>
  <tr>
    <td>Contact</td>
     <td><label for="textfield3"></label>
      <input type="text" name="textfield3" id="textfield3" /></td>
  </tr>
  <tr>
    <td>Place</td>
     <td><label for="textfield5"></label>
      <input type="text" name="textfield5" id="textfield5" /></td>
  </tr>
  <tr>
    <td>Pin</td>
     <td><label for="textfield6"></label>
      <input type="text" name="textfield6" id="textfield6" /></td>
  </tr>
  <tr>
    <td>Post</td>
     <td><label for="textfield7"></label>
      <input type="text" name="textfield7" id="textfield7" /></td>
  </tr>
  <tr>
    <td>Photo</td>
    <td><input type="file" name="imageField" id="imageField" src="../admin/img" /></td>
  </tr>
  <tr>
    <td>Age</td>
    <td><label for="textfield8"></label>
      <input type="text" name="textfield8" id="textfield8" /></td>
  </tr>
  <tr>
    <td>Gender</td>
    <td><p>
      <label>
        <input type="radio" name="RadioGroup1" value="Male" id="RadioGroup1_0" />
        Male</label>
      <br />
      <label>
        <input type="radio" name="RadioGroup1" value="Female" id="RadioGroup1_1" />
        Female</label>
      <br />
    </p></td>
  </tr>
      <tr>
    <td>Password</td>
    <td><label for="textfield3"></label>
      <input type="text" name="password" id="textfield2" /></td>
  </tr>
      <tr>
    <td>Confrim Password</td>
    <td><label for="textfield3"></label>
      <input type="text" name="confrimpasw" id="textfield2" /></td>
  </tr>
  <tr>
    <td>&nbsp;</td>
    <td><input type="submit" name="Sign-up" id="Sign-up" value="Sign-up" /></td>
  </tr>
</table>


</form>

</body>
</html>
