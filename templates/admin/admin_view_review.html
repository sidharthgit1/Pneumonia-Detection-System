{% extends "admin/adminindex.html" %}
{% block body %}

<form action="/myapp/admin_view_review_post/" method="post">
    {% csrf_token %}
<table width="304" border="1" class="table table-bordered">
  <tr>
      <td>From</td>
    <td><input type="date" name="textfield" id="textfield" class="form-control" required/></td>
        <td>To</td>

   <td><input type="date" name="textfield2" id="textfield" class="form-control" required/></td>
    <td width="72"><input type="submit" name="button" id="button" value="Search" class="btn btn-success" /></td>

  </tr>
</table>
<table width="296" border="1" class="table table-bordered">
  <tr>
    <td>S1 no</td>
    <td>Username</td>
    <td>Date</td>
    <td>Feedback</td>
  
  </tr>
    {% for i in data %}
  <tr>
    <td height="33">{{ forloop.counter }}&nbsp;</td>
    <td>{{ i.USER.name }}&nbsp;</td>
    <td>&nbsp;{{ i.date }}</td>
    <td>&nbsp;{{ i.feedback }}</td>
  

  </tr>
    {% endfor %}
</table>

</form>
